<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StartInno Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    /* Animated title - slowly reveals */
    h1 {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
      min-height: 70px;
      opacity: 0;
      animation: titleReveal 6s ease-in-out forwards;
    }

    @keyframes titleReveal {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Tagline - appears after title */
    .tagline {
      font-size: 20px;
      color: #38bdf8;
      line-height: 1.8;
      opacity: 0;
      animation: taglineReveal 1.5s ease-in-out 6s forwards;
    }

    @keyframes taglineReveal {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Enter button - appears last */
    .enter-btn-container {
      margin-top: 40px;
      opacity: 0;
      animation: buttonReveal 0.8s ease-in-out 7.8s forwards;
    }

    @keyframes buttonReveal {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .btn {
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.2px;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, color 180ms ease, border-color 180ms ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn-primary {
      color: #ffffff;
      background: linear-gradient(135deg, #f59e0b 0%, #f97316 52%, #9a3412 130%);
      box-shadow: 0 14px 30px rgba(245, 158, 11, 0.34), 0 6px 16px rgba(15, 23, 42, 0.25);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 52%, #c2410c 130%);
      box-shadow: 0 18px 36px rgba(245, 158, 11, 0.42), 0 8px 18px rgba(15, 23, 42, 0.3);
    }

    .btn-secondary {
      color: #dbeafe;
      background: rgba(30, 41, 59, 0.35);
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
    }

    .btn-secondary:hover {
      background: rgba(59, 130, 246, 0.12);
      border-color: rgba(96, 165, 250, 0.45);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.24);
    }

    .btn-danger {
      color: #ffffff;
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 52%, #7f1d1d 130%);
      box-shadow: 0 14px 30px rgba(239, 68, 68, 0.24), 0 6px 16px rgba(15, 23, 42, 0.2);
    }

    .btn-danger:hover {
      background: linear-gradient(135deg, #f87171 0%, #ef4444 52%, #991b1b 130%);
      box-shadow: 0 18px 36px rgba(239, 68, 68, 0.34), 0 8px 18px rgba(15, 23, 42, 0.24);
    }

    .btn-sm {
      height: 44px;
      padding: 0 16px;
      font-size: 14px;
      border-radius: 12px;
    }

    .btn-lg {
      height: 62px;
      padding: 0 32px;
      font-size: 18px;
      border-radius: 18px;
      min-width: 180px;
    }

    .enter-btn {
      width: 200px;
      min-height: 62px;
      padding: 0 34px;
      border-radius: 18px;
      font-size: 20px;
      position: relative;
      isolation: isolate;
      overflow: hidden;
      color: #172554;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid rgba(56, 189, 248, 0.28);
      box-shadow:
        0 14px 30px rgba(15, 23, 42, 0.18),
        0 0 0 1px rgba(255, 255, 255, 0.72) inset,
        0 0 14px rgba(56, 189, 248, 0.22);
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, color 180ms ease, border-color 180ms ease;
    }

    .enter-btn::before {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: inherit;
      padding: 2px;
      background: conic-gradient(from 0deg, #22d3ee, #3b82f6, #8b5cf6, #22d3ee, #38bdf8, #22d3ee);
      animation: borderSpin 2s linear infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
      box-shadow:
        0 0 10px rgba(34, 211, 238, 0.75),
        0 0 22px rgba(59, 130, 246, 0.45);
    }

    .enter-btn:hover {
      transform: translateY(-2px) scale(1.04);
      color: #ffffff;
      background: linear-gradient(135deg, #f59e0b 0%, #f97316 52%, #9a3412 130%);
      border-color: rgba(249, 115, 22, 0.45);
      box-shadow: 0 18px 36px rgba(245, 158, 11, 0.34), 0 8px 18px rgba(15, 23, 42, 0.24);
    }

    .enter-btn:hover::before {
      background: conic-gradient(from 0deg, #f97316, #fb923c, #ffffff, #f59e0b, #f97316, #fb923c, #f97316);
      box-shadow:
        0 0 12px rgba(249, 115, 22, 0.9),
        0 0 26px rgba(245, 158, 11, 0.5);
    }

    .enter-btn:active {
      transform: translateY(1px) scale(0.98);
    }

    @keyframes borderSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Bottom info */
    .footer-info {
      position: fixed;
      bottom: 20px;
      right: 30px;
      font-size: 14px;
      color: #38bdf8;
      text-align: right;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .footer-email-icon {
      width: 20px;
      height: 20px;
      display: block;
      flex: 0 0 auto;
      filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.35));
    }

    .footer-email-text {
      font-size: 14px;
      color: #dbeafe;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 40px;
      }
      .tagline {
        font-size: 16px;
      }
      .enter-btn {
        width: 160px;
        min-height: 54px;
        font-size: 16px;
        border-radius: 16px;
        padding: 0 24px;
      }
      .footer-info {
        font-size: 12px;
        right: 20px;
        bottom: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">StartInno Solutions</h1>

    <div class="tagline">
      Think | Build | Launch <br>
      Let's Innovate Together
    </div>

    <div class="enter-btn-container">
      <button id="enterBtn" class="btn btn-primary btn-lg enter-btn">Enter</button>
    </div>
  </div>

  <div class="footer-info">
    <img
      class="footer-email-icon"
      src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2338bdf8' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='5' width='18' height='14' rx='3'/%3E%3Cpath d='M4 7l8 6 8-6'/%3E%3C/svg%3E"
      alt="Email"
    />
    <span class="footer-email-text">askconnect4@gmail.com</span>
  </div>

  <script>
    const APP_BASE_URL = (() => {
      if (typeof window !== 'undefined' && window.API_BASE_OVERRIDE) {
        return String(window.API_BASE_OVERRIDE).replace(/\/$/, '');
      }

      try {
        const viteApiUrl = Function('return (import.meta && import.meta.env && import.meta.env.VITE_API_URL) ? import.meta.env.VITE_API_URL : "";')();
        if (viteApiUrl) return String(viteApiUrl).replace(/\/$/, '');
      } catch (error) {
        // ignore when import.meta is unavailable in non-module scripts
      }

      if (typeof window !== 'undefined' && window.location) {
        const hostname = window.location.hostname;
        if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '0.0.0.0') {
          return 'http://localhost:5001';
        }
      }

      return '';
    })();
    const enterBtn = document.getElementById('enterBtn');

    function navigateToLoginPage() {
      const loginUrl = new URL('./login.html', window.location.href);
      window.location.assign(loginUrl.toString());
    }

    function userLogout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.clear();
        sessionStorage.clear();
        navigateToLoginPage();
      }
    }
    window.userLogout = userLogout;

    enterBtn.addEventListener('click', () => {
      navigateToLoginPage();
    });

    // Enable Enter key to navigate
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        navigateToLoginPage();
      }
    });
  </script>
</body>
</html>
