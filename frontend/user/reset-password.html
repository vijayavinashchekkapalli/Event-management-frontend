<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - StartInno Solutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a2a4a 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .card {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 28px;
      color: #ffffff;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .header p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      background: rgba(30, 41, 59, 0.5);
      color: #f8fafc;
      font-family: inherit;
      font-size: 14px;
      transition: all 200ms ease;
    }

    input:focus {
      outline: none;
      border-color: rgba(56, 189, 248, 0.5);
      background: rgba(30, 41, 59, 0.8);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
    }

    input::placeholder {
      color: #64748b;
    }

    .password-strength {
      margin-top: 6px;
      height: 4px;
      border-radius: 2px;
      background: rgba(148, 163, 184, 0.1);
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: all 300ms ease;
    }

    .strength-bar.weak {
      width: 33%;
      background: #ef4444;
    }

    .strength-bar.fair {
      width: 66%;
      background: #f59e0b;
    }

    .strength-bar.good {
      width: 100%;
      background: #10b981;
    }

    .strength-text {
      font-size: 11px;
      margin-top: 4px;
      font-weight: 600;
    }

    .strength-text.weak {
      color: #ef4444;
    }

    .strength-text.fair {
      color: #f59e0b;
    }

    .strength-text.good {
      color: #10b981;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: 0;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms ease;
      font-family: inherit;
      margin-top: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 14px 35px rgba(37, 99, 235, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .message.success {
      background: rgba(16, 185, 129, 0.1);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .message.warning {
      background: rgba(234, 179, 8, 0.1);
      color: #fcd34d;
      border: 1px solid rgba(234, 179, 8, 0.2);
    }

    .footer-links {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
    }

    .footer-links a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 13px;
      transition: color 200ms ease;
    }

    .footer-links a:hover {
      color: #93c5fd;
      text-decoration: underline;
    }

    .loading {
      display: none;
      text-align: center;
      color: #94a3b8;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(56, 189, 248, 0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success-screen {
      display: none;
      text-align: center;
    }

    .success-icon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: successPulse 0.6s ease;
    }

    @keyframes successPulse {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-title {
      font-size: 24px;
      color: #10b981;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .success-message {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    @media (max-width: 600px) {
      .card {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .header-icon {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- Reset Form -->
      <div id="resetForm">
        <div class="header">
          <div class="header-icon">🔑</div>
          <h1>Reset Password</h1>
          <p>Enter your new password below. Make sure it's strong and secure.</p>
        </div>

        <form id="passwordForm">
          <div id="messageContainer"></div>

          <div class="form-group">
            <label for="password">New Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter new password"
              minlength="6"
              required
            >
            <div class="password-strength">
              <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-text" id="strengthText"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Confirm new password"
              required
            >
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">
            Reset Password
          </button>

          <div class="loading" id="loading">
            <span class="spinner"></span>
            Resetting password...
          </div>
        </form>
      </div>

      <!-- Success Screen -->
      <div id="successScreen" class="success-screen">
        <div class="success-icon">✓</div>
        <div class="success-title">Password Reset Successful</div>
        <div class="success-message">
          Your password has been reset successfully. You can now log in with your new password.
        </div>
          <a href="/user/login" class="btn btn-primary">Go to Login</a>
      </div>

      <div class="footer-links" id="footerLinks">
          <a href="/user/login">Back to Login</a>
      </div>
    </div>
  </div>

  <script>
     const API_BASE = `${window.location.protocol}//${window.location.host}`;
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');
    const form = document.getElementById('passwordForm');
    const messageContainer = document.getElementById('messageContainer');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    const resetFormDiv = document.getElementById('resetForm');
    const successScreen = document.getElementById('successScreen');
    const footerLinks = document.getElementById('footerLinks');

    // Get token from query string (?token=...)
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Validate token on page load
    window.addEventListener('load', async () => {
      if (!token) {
        showMessage('Invalid reset link. Please request a new one.', 'error');
        submitBtn.disabled = true;
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/api/auth/validate-reset-token/${token}`);
        const data = await response.json();

        if (!data.success) {
          showMessage(data.message || 'This reset link is invalid or has expired.', 'error');
          submitBtn.disabled = true;
        }
      } catch (error) {
        console.error('Error validating token:', error);
        showMessage('Error validating reset link. Please try again.', 'error');
        submitBtn.disabled = true;
      }
    });

    // Password strength indicator
    passwordInput.addEventListener('input', () => {
      const password = passwordInput.value;
      const strength = checkPasswordStrength(password);

      strengthBar.className = 'strength-bar';
      strengthText.className = 'strength-text';

      if (password.length === 0) {
        strengthBar.classList.remove('weak', 'fair', 'good');
        strengthText.textContent = '';
      } else if (strength === 'weak') {
        strengthBar.classList.add('weak');
        strengthText.classList.add('weak');
        strengthText.textContent = 'Weak password';
      } else if (strength === 'fair') {
        strengthBar.classList.add('fair');
        strengthText.classList.add('fair');
        strengthText.textContent = 'Fair password';
      } else {
        strengthBar.classList.add('good');
        strengthText.classList.add('good');
        strengthText.textContent = 'Strong password';
      }
    });

    function checkPasswordStrength(password) {
      let strength = 0;
      if (password.length >= 8) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/\d/.test(password)) strength++;
      if (/[^a-zA-Z\d]/.test(password)) strength++;

      if (strength <= 1) return 'weak';
      if (strength <= 2) return 'fair';
      return 'good';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!password || !confirmPassword) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters long', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMessage('Passwords do not match', 'error');
        return;
      }

      try {
        submitBtn.disabled = true;
        loading.style.display = 'block';
        messageContainer.innerHTML = '';

        const response = await fetch(`${API_BASE}/api/auth/reset-password/${token}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password, confirmPassword })
        });

        const data = await response.json();

        if (data.success) {
          resetFormDiv.style.display = 'none';
          successScreen.style.display = 'block';
          footerLinks.innerHTML = '<a href="/user/login" class="btn btn-primary">Go to Login</a>';
          
          // Automatically redirect to login after 3 seconds
          setTimeout(() => {
            window.location.href = '/user/login';
          }, 3000);
        } else {
          showMessage(data.message || 'An error occurred', 'error');
          submitBtn.disabled = false;
        }
      } catch (error) {
        console.error('Error:', error);
        showMessage('Failed to reset password. Please try again.', 'error');
        submitBtn.disabled = false;
      } finally {
        loading.style.display = 'none';
      }
    });

    function showMessage(message, type) {
      messageContainer.innerHTML = `<div class="message ${type}">${message}</div>`;
      messageContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  </script>
</body>
</html>
